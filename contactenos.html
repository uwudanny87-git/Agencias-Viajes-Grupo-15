<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <title>Contáctenos - Agencia de Viajes</title>
    <!-- Conexión con el CSS -->
    <link rel="stylesheet" href="./css/contactenos.css">
</head>
<body>
<!-- CONTENEDOR DE LA PANTALLA -->
<div class="pantalla">
    <!-- TÍTULO -->
    <h1>Contáctenos</h1>
    <p class="subtitulo">Planea tu próxima aventura con nosotros ✈️</p>
     <!-- CONTENEDOR PRINCIPAL -->
     <div class="contenedor">
         <!-- FORMULARIO -->
         <div class="formulario">
            <h2>Formulario de Contacto</h2>
             <form>
                <!-- Nombre -->
                <label>Nombre</label>
                <input type="text" placeholder="Ingresa tu nombre">
                <!-- Correo -->
                <label>Correo</label>
                <input type="email" placeholder="Ingresa tu correo">
                 <!-- Mensaje -->
                <label>Mensaje</label>
                <textarea placeholder="Escribe tu mensaje"></textarea>
                <!-- Botón -->
                <button>Enviar mensaje</button>
            </form>
    </div>
    <!-- INFORMACIÓN -->
    <div class="info">
        <h2>Información de contacto</h2>
            <p><strong> 📞Teléfono:</strong> 320 456 7890</p>
            <p><strong> 📍Dirección:</strong> Calle 45 #12-30</p>
            <p><strong> 📧Email:</strong> contacto@viajes.com</p>
        <h3 class="redes-titulo">Redes Sociales</h3>
        <div class="redes">
            <p>⭐Facebook</p>
            <p>📸Instagram</p>
            <p>💬WhatsApp</p>
        </div>
        </div>
    </div>
</div>
</body>
</html>
